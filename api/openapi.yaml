    DNSRecord:
      description: Read-only representation of a DNS record from the cPanel zone dump.
      example:
        address: address
        flag: 7
        preference: 1
        cname: cname
        weight: 5
        type: type
        unencoded: unencoded
        priority: 5
        ttl: 6
        target: target
        Line: 0
        txtdata: txtdata
        port: 2
        name: name
        exchange: exchange
        tag: tag
        value: value
      properties:
        Line:
          readOnly: true
          type: integer
        name:
          readOnly: true
          type: string
        ttl:
          readOnly: true
          type: integer
        type:
          readOnly: true
          type: string
        address:
          readOnly: true
          type: string
        cname:
          readOnly: true
          type: string
        exchange:
          readOnly: true
          type: string
        preference:
          readOnly: true
          type: integer
        txtdata:
          readOnly: true
          type: string
        unencoded:
          readOnly: true
          type: string
        target:
          readOnly: true
          type: string
        priority:
          readOnly: true
          type: integer
        weight:
          readOnly: true
          type: integer
        port:
          readOnly: true
          type: integer
        flag:
          readOnly: true
          type: integer
        tag:
          readOnly: true
          type: string
        value:
          readOnly: true
          type: string
      required:
      - Line
      - address
      - cname
      - exchange
      - flag
      - name
      - port
      - preference
      - priority
      - tag
      - target
      - ttl
      - txtdata
      - type
      - unencoded
      - value
      - weight
      type: object
    DNSRecordCreate:
      description: Validate input for creating or editing a DNS record.
      example:
        address: address
        flag: 2
        line: 7
        preference: 6
        cname: cname
        weight: 5
        type: ""
        unencoded: unencoded
        priority: 1
        ttl: 0
        target: target
        txtdata: txtdata
        port: 5
        name: name
        exchange: exchange
        tag: tag
        value: value
      properties:
        name:
          description: Record hostname (use '@' or leave empty for zone apex).
          type: string
        ttl:
          description: Time to live in seconds.
          type: integer
        type:
          allOf:
          - $ref: "#/components/schemas/DNSRecordCreateTypeEnum"
          description: |-
            DNS record type.

            * `A` - A
            * `AAAA` - AAAA
            * `TYPE257` - TYPE257
            * `CNAME` - CNAME
            * `MX` - MX
            * `SRV` - SRV
            * `TXT` - TXT
        address:
          description: IPv4/IPv6 address (A/AAAA).
          type: string
        cname:
          description: Canonical name (CNAME).
          type: string
        exchange:
          description: Mail exchange host (MX).
          type: string
        preference:
          description: MX preference / priority.
          type: integer
        txtdata:
          description: TXT record data.
          type: string
        unencoded:
          description: Unencoded TXT value.
          type: string
        target:
          description: SRV target host.
          type: string
        priority:
          description: SRV priority.
          type: integer
        weight:
          description: SRV weight.
          type: integer
        port:
          description: SRV port.
          type: integer
        flag:
          description: CAA flag (TYPE257).
          type: integer
        tag:
          description: CAA tag (TYPE257).
          type: string
        value:
          description: CAA value (TYPE257).
          type: string
        line:
          description: Line number of existing record to edit. Omit to add a new record.
          type: integer
      required:
      - name
      - ttl
      - type
      type: object
    DNSRecordCreateTypeEnum:
      description: |-
        * `A` - A
        * `AAAA` - AAAA
        * `TYPE257` - TYPE257
        * `CNAME` - CNAME
        * `MX` - MX
        * `SRV` - SRV
        * `TXT` - TXT
      enum:
      - A
      - AAAA
      - TYPE257
      - CNAME
      - MX
      - SRV
      - TXT
      type: string
