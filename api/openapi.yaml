openapi: 3.0.3
info:
  contact:
    email: support@pidginhost.com
    name: PidginHost
    url: https://www.pidginhost.com
  description: |-
    The Pidgin Host API allows you to manage Services and resources within the Pidgin Host cloud in a simple, programmatic way using conventional HTTP requests.
    All of the functionality that you are familiar with in the Pidgin Host control panel is also available through the API, allowing you to script the complex actions that your situation requires.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Pidgin Host API
  version: 1.0.0 (v1)
servers:
- description: PRODUCTION
  url: https://www.pidginhost.com/
paths:
  /api/account/api-tokens/:
    get:
      description: Manage your API tokens
      operationId: account_api_tokens_list
      parameters:
      - description: A page number within the paginated result set.
        explode: true
        in: query
        name: page
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAPITokenListList"
          description: ""
      security:
      - cookieAuth: []
      - tokenAuth: []
      tags:
      - account
    post:
